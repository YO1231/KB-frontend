<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>객체 직접 스타일 변경</title>
  </head>
  <body>
    <div id="app">
      <p :style="{ color: textColor, fontSize: fontSize + 'px'}">
        글자가 크기가 동적으로 변경
      </p>
      <button @click="fontSize += 2">글자 크게</button>
      <button @click="fontSize -= 2">글자 작게</button>
      <button @click="changeColor">색상 변경</button>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return {
            textColor: 'red',
            fontSize: 20,
          };
        },
        methods: {
          changeColor() {
            this.textColor = this.textColor === 'red' ? 'blue' : 'orange';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
