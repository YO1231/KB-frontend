<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <child-component v-on:sh="printText"></child-component>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return { message: 'hello' };
        },
        methods: {
          printText(...args) {
            alert(args[0]);
          },
        },
      });

      app.component('child-component', {
        data() {
          return {};
        },
        methods: {
          showLog() {
            console.log(this);
            this.$emit('sh', 100);
          },
        },
        template: '<button @click="showLog">Click!</button>',
      });

      var vm = app.mount('#app');
    </script>
  </body>
</html>
