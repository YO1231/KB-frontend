<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      th {
        background-color: greenyellow;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <table style="border-collapse: collapse" border="1">
        <thead>
          <tr>
            <th>순번</th>
            <th>학번</th>
            <th>이름</th>
            <th>학과</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="(student, idx) in students" :key="student.no">
            <td>{{ idx + 1 }}</td>
            <td>{{ student.no }}</td>
            <td>{{ student.name }}</td>
            <td>{{ student.dept }}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return {
            students: [
              {
                no: '1234',
                name: '이윤정',
                dept: '컴공',
              },
              {
                no: '1235',
                name: '신사임당',
                dept: '국어국문',
              },
              {
                no: '1236',
                name: '강감찬',
                dept: '기계학과',
              },
            ],
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
