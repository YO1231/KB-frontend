<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      message: {{mg}}
      <br /><br />
      <h2 v-text="mg"></h2>
      <h2 v-html="mg"></h2>

      Vue.createApp({
        name: 'App',
        data() {
          return {
            mg: '<i>소리없는 아우성!</i>',
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
