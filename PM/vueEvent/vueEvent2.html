<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <input
        type="text"
        :value="name"
        @input="changeName"
        placeholder="이름을 입력하세요"
      />
      <p>입력한 이름: {{name}}</p>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return {
            name: '',
          };
        },
        methods: {
          changeName(e) {
            this.name = e.target.value;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
