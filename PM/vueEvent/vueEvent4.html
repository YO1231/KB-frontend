<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      /* 바깥 영역 */
      #outer {
        width: 300px;
        height: 200px;
        background-color: lightblue;
        padding: 20px;
      }

      /* 안쪽 영역 */
      #inner {
        width: 120px;
        height: 100px;
        background-color: gold;
        line-height: 100px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="outer" @click="outerClick">
        Outer
        <div id="inner" @click="innerClick">Inner</div>
      </div>
      <p>{{log}}</p>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return { log: '' };
        },
        methods: {
          outerClick(e) {
            this.log += 'outer Click / ';
          },
          innerClick(e) {
            this.log += 'inner Click / ';
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>
