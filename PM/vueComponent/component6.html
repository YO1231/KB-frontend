<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <global-component-a :my-string="message"></global-component-a>
      <global-component-b v-on:event-b="rootMyFunc"></global-component-b>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var app = Vue.createApp({
        name: 'App',
        data() {
          return { message: '' };
        },
        methods: {
          rootMyFunc: function (data) {
            console.log('root로 전달된 데이터', data);
            this.message = data;
          },
        }, // method
      }); // app

      app.component('global-component-a', {
        template: `
                <div>
                    <local-component-c></local-component-c>
                    <local-component-d v-bind:my-data="myString"></local-component-d>
                </div>
            `,
        props: {
          myString: String,
        },
        components: {
          'local-component-c': {
            template: '<div>Local Component C</div>',
          },
          'local-component-d': {
            template: `
                    <div>
                        <div>Local Component D</div>
                        <div>전달된 데이터 : {{ myData }}</div>
                    </div>
                    `,
            props: {
              myData: String,
            },
          },
        },
      });

      app.component('global-component-b', {
        template: `
                <local-component-f v-on:event-f="myFunc"></local-component-f>
            `,
        methods: {
          myFunc: function (data) {
            console.log('입력된 값', data);
            this.$emit('event-b', data);
          },
        },
        components: {
          'local-component-f': {
            data() {
              return {
                myText: '',
              };
            },
            template: `
                    <div>
                        <input type="text" v-model="myText" id="inputText" @keyup.enter="btnClick">
                        <button v-on:click="btnClick">클릭</button>
                    </div>
                    `,
            methods: {
              btnClick: function () {
                this.$emit('event-f', this.myText);
                this.myText = '';
              },
            },
          },
        },
      });

      var vm = app.mount('#app');
    </script>
  </body>
</html>
