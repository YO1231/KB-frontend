<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container py-4">
      <h1><i class="fa-regular fa-pen-to-square"></i> 새 글쓰기</h1>

      <form>
        <div class="mb-3 mt-3">
          <label for="title" class="mb-2">제목</label>
          <input type="text" class="form-control" id="text" name="text" />
        </div>

        <div class="mb-3 mt-3">
          <label for="author" class="mb-2">작성자</label>
          <input type="text" class="form-control" id="author" name="author" />
        </div>

        <div class="mb-3 mt-3">
          <label for="content" class="mb-2">내용</label>
          <textarea class="form-control" id="content" rows="10"></textarea>
        </div>
      </form>

      <button class="btn btn-primary">
        <i class="fa-solid fa-check"></i> 확인
      </button>
      <button class="btn btn-primary">
        <i class="fa-solid fa-arrow-rotate-left"></i> 취소
      </button>
      <button class="btn btn-primary">
        <i class="fa-solid fa-list"></i> 목록
      </button>
    </div>
  </body>
</html>
