<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
      integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div class="container py-4">
      <h1><i class="fa-solid fa-user-plus"></i> 회원 가입</h1>

      <form class="mt-4">
        <label for="user" class="mt-3 mb-2"
          ><i class="fa-solid fa-user"></i> 사용자 ID:</label
        >
        <input type="text" class="form-control" id="user" name="user" />
        <label for="password" class="mt-3 mb-2"
          ><i class="fa-solid fa-lock"></i> 비밀번호:</label
        >
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
        />
        <label for="passwordConfirm" class="mt-3 mb-2"
          ><i class="fa-solid fa-lock"></i> 비밀번호 확인:</label
        >
        <input
          type="password"
          class="form-control"
          id="passwordConfirm"
          name="passwordConfirm"
        />
        <label for="email" class="mt-3 mb-2"
          ><i class="fa-regular fa-envelope"></i> email:</label
        >
        <input type="email" class="form-control" id="email" name="email" />
        <label for="file" class="mt-3 mb-2"
          ><i class="fa-solid fa-user-astronaut"></i> 아바타 이미지</label
        >
        <input type="file" class="form-control" id="file" name="file" />

        <div class="d-flex justify-content-center">
          <button class="btn btn-primary mt-3">
            <i class="fa-solid fa-user-plus"></i> 회원 가입
          </button>
        </div>
      </form>
    </div>
  </body>
</html>
