<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td>
              <label for="userId"><b>사용자 ID</b></label>
            </td>
            <td>
              <input id="userId" type="text" name="userId" />
            </td>
          </tr>
          <tr>
            <td>
              <label for="password"><b>비밀번호</b></label>
            </td>
            <td><input id="password" type="password" name="password" /></td>
          </tr>
          <tr>
            <td>
              <label for="passwordConfirm"><b>비밀번호 확인</b></label>
            </td>
            <td>
              <input
                id="passwordConfirm"
                type="password"
                name="passwordConfirm"
              />
            </td>
          </tr>
          <tr>
            <td>
              <label for="username"><b>이름</b></label>
            </td>
            <td><input id="username" type="text" name="username" /></td>
          </tr>
          <tr>
            <td>
              <label for="username"><b>성별</b></label>
            </td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여</label>
            </td>
          </tr>
          <tr>
            <td>
              <label for="hobby"><b>취미</b></label>
            </td>
            <td>
              <input id="soccer" type="checkbox" name="hobby" value="s" />
              <label for="soccer">축구</label>
              <input id="baseball" type="checkbox" name="hobby" value="base" />
              <label for="baseball">야구</label>
              <input id="volleyball" type="checkbox" name="hobby" value="v" />
              <label for="volleyball">배구</label>
              <input
                id="basketball"
                type="checkbox"
                name="hobby"
                value="basket"
              />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <td>
              <label for="mail"><b>email</b></label>
            </td>
            <td><input type="email" name="mail" /></td>
          </tr>
          <tr>
            <td>
              <label for="role"><b>역할</b></label>
            </td>
            <td>
              <select name="role">
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
